<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF8C42">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="柚子">
  <title>柚子成长记录</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Offline Banner -->
  <div id="offline-banner" class="offline-banner hidden" role="alert">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v8a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z"></path><path d="M12 13v4"></path><path d="M12 7v2"></path></svg>
    当前处于离线模式，部分功能可能受限
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <span class="header-title">🐱 柚子の成长记录</span>
    </div>
  </header>

  <main class="main-content">
    <!-- Profile Section -->
    <section class="section profile-section">
      <div class="profile-card" id="profile-card">
        <div class="profile-avatar-container">
          <div class="profile-avatar" id="profile-avatar">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5c.67 0 1.35.09 2 .26 1.78-2 5.03-2.84 6.42-2.26 1.4.58-.42 7-.42 7 .57 1.07 1 2.24 1 3.44C21 17.9 16.97 21 12 21s-9-3-9-7.56c0-1.25.5-2.4 1-3.44 0 0-1.89-6.42-.5-7 1.39-.58 4.72.23 6.5 2.23A9.04 9.04 0 0 1 12 5Z"></path><path d="M8 14v.5"></path><path d="M16 14v.5"></path><path d="M11.25 16.25h1.5L12 17l-.75-.75Z"></path></svg>
          </div>
          <button class="edit-avatar-btn" id="edit-avatar-btn" title="更换头像">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
        </div>
        <div class="profile-info">
          <h1 class="profile-name" id="profile-name-display">柚子</h1>
          <span class="profile-badge" id="profile-breed-display">中华田园猫</span>
          <div class="profile-dates">
            <div class="profile-date-item">
              <span class="date-label">🎂 生日</span>
              <span class="date-value" id="cat-birthday-display">未设置</span>
            </div>
            <div class="profile-date-item">
              <span class="date-label">🏠 到家</span>
              <span class="date-value" id="cat-arrival-display">未设置</span>
            </div>
          </div>
          <button class="edit-profile-btn" id="edit-profile-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path></svg>
            编辑档案
          </button>
        </div>
      </div>
    </section>

    <!-- Stats Cards -->
    <section class="section stats-section">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📅</div>
          <div class="stat-value" id="stat-months">--</div>
          <div class="stat-label">当前月龄</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⚖️</div>
          <div class="stat-value" id="stat-weight">--</div>
          <div class="stat-label">最近体重</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📝</div>
          <div class="stat-value" id="stat-records">0</div>
          <div class="stat-label">成长记录</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🔄</div>
          <div class="stat-value" id="stat-last-update">--</div>
          <div class="stat-label">上次更新</div>
        </div>
      </div>
    </section>

    <!-- Timeline Section -->
    <section class="section timeline-section">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        成长时光轴
      </h2>
      <div id="timeline" class="timeline"></div>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-illustration">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
            <ellipse cx="60" cy="100" rx="35" ry="12" fill="#E8E0D5" opacity="0.5"/>
            <circle cx="60" cy="65" r="25" fill="#FEEED4"/>
            <polygon points="42,48 45,30 55,45" fill="#FEEED4"/>
            <polygon points="78,48 75,30 65,45" fill="#FEEED4"/>
            <ellipse cx="52" cy="65" rx="5" ry="6" fill="#4A3728"/>
            <ellipse cx="68" cy="65" rx="5" ry="6" fill="#4A3728"/>
            <circle cx="54" cy="62" r="2" fill="white"/>
            <circle cx="70" cy="62" r="2" fill="white"/>
            <ellipse cx="60" cy="75" rx="4" ry="3" fill="#FF8C42"/>
            <path d="M55,82 Q60,88 65,82" stroke="#4A3728" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <ellipse cx="30" cy="68" rx="8" ry="6" fill="#FFB74D" opacity="0.4"/>
            <circle cx="26" cy="62" r="4" fill="#FFB74D" opacity="0.4"/>
            <circle cx="34" cy="62" r="4" fill="#FFB74D" opacity="0.4"/>
            <circle cx="24" cy="68" r="3" fill="#FFB74D" opacity="0.4"/>
            <circle cx="36" cy="68" r="3" fill="#FFB74D" opacity="0.4"/>
            <ellipse cx="90" cy="68" rx="8" ry="6" fill="#FFB74D" opacity="0.4"/>
            <circle cx="86" cy="62" r="4" fill="#FFB74D" opacity="0.4"/>
            <circle cx="94" cy="62" r="4" fill="#FFB74D" opacity="0.4"/>
            <circle cx="84" cy="68" r="3" fill="#FFB74D" opacity="0.4"/>
            <circle cx="96" cy="68" r="3" fill="#FFB74D" opacity="0.4"/>
          </svg>
        </div>
        <h3 class="empty-title">还没有记录呢</h3>
        <p class="empty-text">点击右下角的按钮，记录柚子的第一个精彩瞬间吧！</p>
      </div>
    </section>
  </main>

  <!-- FAB -->
  <button class="fab" id="add-record-btn" aria-label="添加记录">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>

  <!-- Record Modal -->
  <div id="record-modal" class="modal hidden">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">添加记录</h3>
      <button class="modal-close" id="modal-close" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="record-form">
        <div class="form-group">
          <label class="form-label" for="record-date">📅 日期</label>
          <input type="date" id="record-date" class="form-input" required max="">
        </div>
        <div class="form-group">
          <label class="form-label">🎯 类型</label>
          <div class="type-selector" id="type-selector">
            <button type="button" class="type-btn active" data-type="daily">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.83 0 0 1 3 3L7 19l-4 1 1-5.5Z"></path></svg>
              日常
            </button>
            <button type="button" class="type-btn" data-type="photo">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path></svg>
              照片
            </button>
            <button type="button" class="type-btn" data-type="weight">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"></circle><path d="M12 8v8"></path><path d="M5 21a7 7 0 0 1 14 0"></path></svg>
              体重
            </button>
            <button type="button" class="type-btn" data-type="milestone">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
              里程碑
            </button>
          </div>
        </div>
        <div class="form-group" id="weight-group">
          <label class="form-label" for="record-weight">⚖️ 体重 (kg)</label>
          <input type="number" id="record-weight" class="form-input" step="0.01" min="0" max="50" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label" for="record-title">✏️ 标题 <span class="required">*</span></label>
          <input type="text" id="record-title" class="form-input" placeholder="记录这一刻..." required maxlength="50">
        </div>
        <div class="form-group">
          <label class="form-label" for="record-description">📝 描述</label>
          <textarea id="record-description" class="form-textarea" placeholder="写下更多细节..." maxlength="500"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">📷 照片</label>
          <div class="photo-upload-area" id="photo-upload-area">
            <div class="photo-placeholder" id="photo-placeholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              <p>点击或拖拽上传照片</p>
              <small>支持多张，每张不超过5MB</small>
            </div>
            <input type="file" id="photo-input" accept="image/*" multiple hidden>
            <div class="photo-preview-grid" id="photo-preview-grid"></div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="modal-cancel">取消</button>
      <button type="button" class="btn btn-primary" id="modal-save">保存</button>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profile-modal" class="modal hidden">
    <div class="modal-header">
      <h3 class="modal-title">编辑柚子档案</h3>
      <button class="modal-close" id="profile-modal-close" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="profile-form">
        <div class="form-group">
          <label class="form-label" for="profile-name">🐱 名字</label>
          <input type="text" id="profile-name" class="form-input" value="柚子" maxlength="20">
        </div>
        <div class="form-group">
          <label class="form-label" for="profile-breed">🐾 品种</label>
          <input type="text" id="profile-breed" class="form-input" value="中华田园猫" maxlength="30">
        </div>
        <div class="form-group">
          <label class="form-label" for="profile-birthday">🎂 生日</label>
          <input type="date" id="profile-birthday" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" for="profile-arrival">🏠 到家的日子</label>
          <input type="date" id="profile-arrival" class="form-input">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="profile-cancel">取消</button>
      <button type="button" class="btn btn-primary" id="profile-save">保存</button>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="modal modal-small hidden">
    <div class="modal-header">
      <h3 class="modal-title">确认删除</h3>
      <button class="modal-close" id="modal-close-delete" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="modal-body">
      <p class="delete-confirm-text">确定要删除这条记录吗？此操作不可撤销。</p>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="delete-cancel">取消</button>
      <button type="button" class="btn btn-danger" id="delete-confirm">删除</button>
    </div>
  </div>

  <!-- Photo Viewer -->
  <div id="photo-viewer" class="photo-viewer hidden">
    <button class="viewer-close" id="viewer-close" aria-label="关闭">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <button class="viewer-nav viewer-prev" id="viewer-prev" aria-label="上一张">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button class="viewer-nav viewer-next" id="viewer-next" aria-label="下一张">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
    <img id="viewer-image" class="viewer-image" alt="预览">
    <div class="viewer-counter" id="viewer-counter"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
